# SAMPLE / REFERENCE WORKFLOW ONLY
# Adapt this workflow for your own repository, image naming, OpenChoreo metadata,
# and promotion process before using it in a real environment.
#
# Prerequisites:
# - A Thunder IDP service account that supports OAuth2 client_credentials
# - Access to push images to GHCR
# - The `occ` CLI available or installable in the runner for the GitOps approach
#
# Required GitHub secrets:
# - OPENCHOREO_CLIENT_ID
# - OPENCHOREO_CLIENT_SECRET
# - OPENCHOREO_API_URL
# - OPENCHOREO_THUNDER_URL
# - GITOPS_REPO
# - GITOPS_TOKEN

name: External CI - OpenChoreo

'on':
  workflow_dispatch:
    inputs:
      approach:
        description: 'Deployment approach'
        required: true
        default: 'api'
        type: choice
        options:
          - api
          - gitops
  push:
    branches: [main]

env:
  NAMESPACE: default
  PROJECT: my-project
  COMPONENT: my-service
  REGISTRY: ghcr.io/${{ github.repository_owner }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write # For GitOps PR
      packages: write # For GHCR push
    steps:
      # 1. Checkout the application source that will be built by the workflow.
      - name: Checkout source
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx so the image can be built and pushed cleanly.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Authenticate to GitHub Container Registry using the GitHub-provided token.
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 4. Build and push the container image that OpenChoreo will deploy.
      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.COMPONENT }}:${{ github.sha }}

      # 5. Install jq so the OAuth2 token response can be parsed in a simple way.
      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # 6. Exchange client credentials for an OAuth2 bearer token from Thunder IDP.
      - name: Get OAuth2 Access Credential
        if: inputs.approach == 'api' || inputs.approach == ''
        id: auth
        run: |
          TOKEN=$(curl -sf -X POST "${{ secrets.OPENCHOREO_THUNDER_URL }}/oauth2/token" \
            -d "grant_type=client_credentials" \
            -d "client_id=${{ secrets.OPENCHOREO_CLIENT_ID }}" \
            -d "client_secret=${{ secrets.OPENCHOREO_CLIENT_SECRET }}" \
            | jq -r '.access_token')
          echo "access_token=${TOKEN}" >> "$GITHUB_OUTPUT"

      # 7a. API approach: create or update the Workload directly through OpenChoreo.
      - name: Create Workload via OpenChoreo API
        if: inputs.approach == 'api' || inputs.approach == ''
        run: |
          curl -sf -X POST \
            "${{ secrets.OPENCHOREO_API_URL }}/api/v1/namespaces/${{ env.NAMESPACE }}/workloads" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.access_token }}" \
            -H "Content-Type: application/json" \
            -d '{"containers":{"main":{"image":"${{ env.REGISTRY }}/${{ env.COMPONENT }}:${{ github.sha }}"}}}'

      # 7b. GitOps approach: check out the GitOps repository that FluxCD watches.
      - name: Clone GitOps Repo
        if: inputs.approach == 'gitops'
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_TOKEN }}
          path: gitops-repo

      # 8. GitOps approach: generate manifests in the GitOps repo using occ CLI.
      - name: Generate Resources with occ CLI
        if: inputs.approach == 'gitops'
        run: |
          # Install occ CLI (adjust version as needed)
          # curl -sL https://github.com/openchoreo/openchoreo/releases/latest/download/occ-linux-amd64 -o /usr/local/bin/occ
          # chmod +x /usr/local/bin/occ

          RELEASE_NAME="${{ env.COMPONENT }}-$(date +%Y%m%d%H%M%S)"

          # Create/update Workload
          occ workload create \
            --mode file-system \
            --root-dir gitops-repo \
            --project ${{ env.PROJECT }} \
            --component ${{ env.COMPONENT }} \
            --image "${{ env.REGISTRY }}/${{ env.COMPONENT }}:${{ github.sha }}"

          # Generate ComponentRelease
          occ componentrelease generate \
            --mode file-system \
            --root-dir gitops-repo \
            --project ${{ env.PROJECT }} \
            --component ${{ env.COMPONENT }} \
            --name "${RELEASE_NAME}" \
            --output-path "gitops-repo/namespaces/${{ env.NAMESPACE }}/projects/${{ env.PROJECT }}/components/${{ env.COMPONENT }}/releases"

          # Generate ReleaseBinding
          occ releasebinding generate \
            --mode file-system \
            --root-dir gitops-repo \
            --project ${{ env.PROJECT }} \
            --component ${{ env.COMPONENT }} \
            --component-release "${RELEASE_NAME}"

      # 9. GitOps approach: create a branch, push the manifest changes, and open a PR.
      - name: Create GitOps PR
        if: inputs.approach == 'gitops'
        working-directory: gitops-repo
        run: |
          BRANCH="release/${{ env.COMPONENT }}-$(date +%Y%m%d%H%M%S)"
          git checkout -b "${BRANCH}"
          git add .
          git commit -m "release: ${{ env.COMPONENT }} image ${{ github.sha }}"
          git push origin "${BRANCH}"
          gh pr create --title "Release ${{ env.COMPONENT }}" --body "Auto-generated by external CI workflow"
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
